<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Paste Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <div id="root"></div>
  <script>
    // Instantly apply transparent class if loading a transparent window route to prevent flash of solid background
    if (window.location.hash.includes('/toast') ||
      window.location.hash.includes('/ocr') ||
      window.location.hash.includes('/web-clipper') ||
      window.location.hash.includes('/paste-history-ring')) {
      document.documentElement.classList.add("is-transparent-window");
      document.body.classList.add("is-transparent-window");
      document.documentElement.style.cssText = "background-color: transparent !important;";
      document.body.style.cssText = "background-color: transparent !important;";
    }
  </script>
  <script type="module" src="./main.tsx"></script>
</body>

</html>
