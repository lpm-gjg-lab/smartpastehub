<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Paste Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <script>
    // Runs BEFORE body renders.
    // Any hash route = floating sub-window (transparent Electron window).
    var hash = window.location.hash;
    var saved = localStorage.getItem("theme") || "dark";
    if (hash && hash !== "#/") {
      // Floating window — transparent background + apply saved theme
      var t = "background-color:transparent!important;";
      document.documentElement.classList.add("is-transparent-window");
      document.documentElement.style.cssText = t;
      document.documentElement.setAttribute("data-theme", saved);
    } else {
      // Main app window — apply saved theme to prevent flash
      if (saved === "light") {
        document.documentElement.setAttribute("data-theme", "light");
      }
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./main.tsx"></script>
</body>

</html>
