name: Release Signed Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    env:
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Preflight signing secrets
        shell: pwsh
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CSC_LINK)) {
            throw "Missing CSC_LINK secret"
          }
          if ([string]::IsNullOrWhiteSpace($env:CSC_KEY_PASSWORD)) {
            throw "Missing CSC_KEY_PASSWORD secret"
          }

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build app
        run: npm run build

      - name: Package signed Windows artifacts
        run: npm run package:win:signed

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-artifacts
          path: release/**
