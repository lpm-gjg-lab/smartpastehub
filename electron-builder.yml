appId: com.smartpastehub.app
productName: Smart Paste Hub
copyright: Copyright © 2026 Smart Paste Hub

directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - package.json
  - logo.png

win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: assets/icons/icon.ico
  forceCodeSigning: false

nsis:
  artifactName: SmartPasteHub-${version}-${arch}-setup.${ext}
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  installerIcon: assets/icons/icon.ico
  uninstallerIcon: assets/icons/icon.ico

portable:
  artifactName: SmartPasteHub-${version}-${arch}-portable.${ext}

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
  icon: assets/icons/icon.icns
  category: public.app-category.utilities
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  notarize: true

linux:
  target:
    - AppImage
    - deb
    - rpm
  icon: assets/icons
  category: Utility
  desktop:
    entry: "StartupWMClass=SmartPasteHub"

publish:
  provider: github
  owner: smartpastehub
  repo: smartpastehub

# autoUpdate is handled at runtime via electron-updater, not electron-builder config
# See src/main/index.ts for updater initialization
